<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>테트리스</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0d0e14;
    --panel: #14151d;
    --grid-line: #1f212c;
    --ink: #e8e9f0;
    --ink-dim: #7d7f92;
    --accent: #6ee7ff;
    --ghost: rgba(255,255,255,0.08);

    --i: #4fd1e8;
    --o: #f6d55c;
    --t: #b58cf0;
    --s: #6ee88a;
    --z: #f2626b;
    --j: #5b8def;
    --l: #f2a25c;
  }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body{
    margin:0; padding:0; min-height:100%;
    background: radial-gradient(120% 100% at 50% -10%, #16171f 0%, var(--bg) 60%);
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    overscroll-behavior: none;
  }
  .stage{
    max-width: 460px;
    margin: 0 auto;
    padding: 22px 16px 30px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }
  .title{
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 26px;
    letter-spacing: -0.01em;
    margin-bottom: 16px;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .title .accent{ color: var(--accent); }

  .layout{
    display: flex;
    gap: 14px;
    flex: 1;
  }
  .board-col{
    flex: 1;
    min-width: 0;
  }
  .side-col{
    width: 108px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .panel{
    background: var(--panel);
    border: 1px solid var(--grid-line);
    border-radius: 10px;
    padding: 10px;
  }
  .panel .label{
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-dim);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .panel .value{
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 20px;
    font-variant-numeric: tabular-nums;
  }

  .mini-canvas-wrap{
    width: 100%;
    aspect-ratio: 1.4/1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #nextCanvas, #holdCanvas{
    width: 100%;
    height: 100%;
  }

  .board-wrap{
    position: relative;
    width: 100%;
    aspect-ratio: 0.5;
    background: var(--panel);
    border: 1px solid var(--grid-line);
    border-radius: 10px;
    overflow: hidden;
  }
  #gameCanvas{
    display: block;
    width: 100%;
    height: 100%;
  }

  .overlay{
    position: absolute; inset: 0;
    background: rgba(13,14,20,0.92);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px;
    text-align: center;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    z-index: 5;
  }
  .overlay.show{ opacity: 1; pointer-events: auto; }
  .overlay h2{
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 28px;
    margin: 0;
    color: var(--ink);
  }
  .overlay p{
    font-size: 13px;
    color: var(--ink-dim);
    margin: 0;
    max-width: 220px;
    line-height: 1.6;
  }
  .ovbtn{
    border: none;
    border-radius: 8px;
    padding: 11px 22px;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    background: var(--accent);
    color: #0d0e14;
    margin-top: 4px;
  }

  .controls{
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-top: 14px;
  }
  .ctrl-btn{
    background: var(--panel);
    border: 1px solid var(--grid-line);
    border-radius: 10px;
    color: var(--ink);
    font-size: 20px;
    padding: 14px 0;
    display: flex; align-items: center; justify-content: center;
    user-select: none;
  }
  .ctrl-btn:active{ background: #1c1e2a; }
  .ctrl-btn.wide{ grid-column: span 2; font-size: 13px; font-weight: 700; letter-spacing: 0.04em; }

  .footer-hint{
    text-align: center;
    font-size: 11px;
    color: var(--ink-dim);
    margin-top: 12px;
    line-height: 1.6;
  }

  @media (min-width: 480px){
    .footer-hint{ display: block; }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="title">테트리스<span class="accent">.</span></div>

  <div class="layout">
    <div class="side-col">
      <div class="panel">
        <div class="label">점수</div>
        <div class="value" id="score">0</div>
      </div>
      <div class="panel">
        <div class="label">최고</div>
        <div class="value" id="best">0</div>
      </div>
      <div class="panel">
        <div class="label">레벨</div>
        <div class="value" id="level">1</div>
      </div>
      <div class="panel">
        <div class="label">줄</div>
        <div class="value" id="lines">0</div>
      </div>
      <div class="panel">
        <div class="label">홀드</div>
        <div class="mini-canvas-wrap"><canvas id="holdCanvas" width="120" height="90"></canvas></div>
      </div>
      <div class="panel">
        <div class="label">다음</div>
        <div class="mini-canvas-wrap"><canvas id="nextCanvas" width="120" height="90"></canvas></div>
      </div>
    </div>

    <div class="board-col">
      <div class="board-wrap" id="boardWrap">
        <canvas id="gameCanvas"></canvas>
        <div class="overlay" id="startOverlay">
          <h2>테트리스</h2>
          <p>블록을 쌓고 줄을 지워 점수를 올리세요.</p>
          <button class="ovbtn" id="startBtn">시작하기</button>
        </div>
        <div class="overlay" id="overOverlay">
          <h2>게임 종료</h2>
          <p id="overText">점수: 0</p>
          <button class="ovbtn" id="retryBtn">다시 하기</button>
        </div>
        <div class="overlay" id="pauseOverlay">
          <h2>일시정지</h2>
          <button class="ovbtn" id="resumeBtn">계속하기</button>
        </div>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="ctrl-btn" id="btnLeft">◀</div>
    <div class="ctrl-btn" id="btnRotate">↻</div>
    <div class="ctrl-btn" id="btnRight">▶</div>
    <div class="ctrl-btn" id="btnDown">▼</div>
    <div class="ctrl-btn wide" id="btnHold">홀드 (C)</div>
    <div class="ctrl-btn wide" id="btnDrop">드롭 (Space)</div>
  </div>

  <div class="footer-hint">← → 이동 · ↑ 회전 · ↓ 소프트드롭 · Space 하드드롭 · C 홀드 · P 일시정지</div>
</div>

<script>
(function(){
  const COLS = 10, ROWS = 20;
  const COLORS = {
    I: getCss('--i'), O: getCss('--o'), T: getCss('--t'),
    S: getCss('--s'), Z: getCss('--z'), J: getCss('--j'), L: getCss('--l')
  };
  function getCss(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

  const SHAPES = {
    I: [[0,1],[1,1],[2,1],[3,1]],
    O: [[1,0],[2,0],[1,1],[2,1]],
    T: [[1,0],[0,1],[1,1],[2,1]],
    S: [[1,0],[2,0],[0,1],[1,1]],
    Z: [[0,0],[1,0],[1,1],[2,1]],
    J: [[0,0],[0,1],[1,1],[2,1]],
    L: [[2,0],[0,1],[1,1],[2,1]]
  };
  const PIECE_KEYS = Object.keys(SHAPES);

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const nextCanvas = document.getElementById('nextCanvas');
  const nextCtx = nextCanvas.getContext('2d');
  const holdCanvas = document.getElementById('holdCanvas');
  const holdCtx = holdCanvas.getContext('2d');
  const boardWrap = document.getElementById('boardWrap');

  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const levelEl = document.getElementById('level');
  const linesEl = document.getElementById('lines');

  const startOverlay = document.getElementById('startOverlay');
  const overOverlay = document.getElementById('overOverlay');
  const pauseOverlay = document.getElementById('pauseOverlay');
  const overText = document.getElementById('overText');
  const startBtn = document.getElementById('startBtn');
  const retryBtn = document.getElementById('retryBtn');
  const resumeBtn = document.getElementById('resumeBtn');

  let best = 0;
  try { best = parseInt(localStorage.getItem('tetris_best')||'0',10) || 0; } catch(e){}
  bestEl.textContent = best;

  let cellPx = 0;
  function resizeCanvas(){
    const rect = boardWrap.getBoundingClientRect();
    canvas.width = rect.width * devicePixelRatio;
    canvas.height = rect.height * devicePixelRatio;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    cellPx = canvas.width / COLS;
    draw();
  }
  window.addEventListener('resize', resizeCanvas);

  let board, current, next, hold, canHold, score, level, linesCleared, dropInterval, dropTimer, running, gameOver, paused;
  let lastTime = 0;

  function emptyBoard(){
    return Array.from({length: ROWS}, () => Array(COLS).fill(null));
  }

  function randomBag(){
    const bag = PIECE_KEYS.slice();
    for(let i=bag.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [bag[i],bag[j]] = [bag[j],bag[i]];
    }
    return bag;
  }
  let bag = [];
  function nextFromBag(){
    if(bag.length === 0) bag = randomBag();
    return bag.pop();
  }

  function makePiece(key){
    return {
      key,
      cells: SHAPES[key].map(c => c.slice()),
      x: 3,
      y: -1,
      rotation: 0
    };
  }

  function rotateCells(cells, key){
    if(key === 'O') return cells.map(c=>c.slice());
    // rotate around approx center (1.5,1) or (0.5,0.5) depending on piece; use simple matrix rotation around point (1,1) for 3x3-ish, (1.5,1.5) for I
    const center = key === 'I' ? 1.5 : 1;
    return cells.map(([x,y]) => {
      const nx = center - (y - center);
      const ny = center + (x - center);
      return [Math.round(nx), Math.round(ny)];
    });
  }

  function collides(cells, x, y){
    for(const [cx,cy] of cells){
      const bx = x+cx, by = y+cy;
      if(bx < 0 || bx >= COLS || by >= ROWS) return true;
      if(by >= 0 && board[by][bx]) return true;
    }
    return false;
  }

  function lockPiece(){
    for(const [cx,cy] of current.cells){
      const bx = current.x+cx, by = current.y+cy;
      if(by >= 0) board[by][bx] = current.key;
    }
    clearLines();
    spawnPiece();
  }

  function clearLines(){
    let cleared = 0;
    const flashRows = [];
    for(let r=ROWS-1;r>=0;r--){
      if(board[r].every(cell => cell)){
        flashRows.push(r);
      }
    }
    if(flashRows.length > 0){
      // remove rows
      flashRows.forEach(r => {
        board.splice(r,1);
        board.unshift(Array(COLS).fill(null));
      });
      cleared = flashRows.length;
      const points = [0,100,300,500,800][cleared] * level;
      score += points;
      linesCleared += cleared;
      const newLevel = Math.floor(linesCleared/10) + 1;
      if(newLevel !== level){
        level = newLevel;
        dropInterval = Math.max(90, 850 - (level-1)*70);
      }
      scoreEl.textContent = score;
      levelEl.textContent = level;
      linesEl.textContent = linesCleared;
      if(score > best){
        best = score;
        bestEl.textContent = best;
        try { localStorage.setItem('tetris_best', String(best)); } catch(e){}
      }
    }
  }

  function spawnPiece(){
    current = makePiece(next || nextFromBag());
    next = nextFromBag();
    canHold = true;
    drawNext();
    if(collides(current.cells, current.x, current.y)){
      endGame();
    }
  }

  function hardDrop(){
    if(!running || paused) return;
    let dist = 0;
    while(!collides(current.cells, current.x, current.y+1)){
      current.y++;
      dist++;
    }
    score += dist*2;
    scoreEl.textContent = score;
    lockPiece();
    draw();
  }

  function softDrop(){
    if(!running || paused) return;
    if(!collides(current.cells, current.x, current.y+1)){
      current.y++;
      score += 1;
      scoreEl.textContent = score;
    } else {
      lockPiece();
    }
    dropTimer = 0;
    draw();
  }

  function moveHorizontal(dx){
    if(!running || paused) return;
    if(!collides(current.cells, current.x+dx, current.y)){
      current.x += dx;
      draw();
    }
  }

  function rotate(){
    if(!running || paused) return;
    const rotated = rotateCells(current.cells, current.key);
    const kicks = [0,-1,1,-2,2];
    for(const k of kicks){
      if(!collides(rotated, current.x+k, current.y)){
        current.cells = rotated;
        current.x += k;
        draw();
        return;
      }
    }
  }

  function doHold(){
    if(!running || paused || !canHold) return;
    canHold = false;
    if(hold === null || hold === undefined){
      hold = current.key;
      spawnPiece();
    } else {
      const temp = hold;
      hold = current.key;
      current = makePiece(temp);
    }
    drawHold();
    draw();
  }

  function ghostY(){
    let gy = current.y;
    while(!collides(current.cells, current.x, gy+1)) gy++;
    return gy;
  }

  function drawCell(context, px, py, size, color){
    context.fillStyle = color;
    context.fillRect(px+1, py+1, size-2, size-2);
    context.fillStyle = 'rgba(255,255,255,0.18)';
    context.fillRect(px+1, py+1, size-2, 3);
  }

  function draw(){
    if(!cellPx) return;
    ctx.clearRect(0,0,canvas.width, canvas.height);
    // grid lines
    ctx.strokeStyle = getCss('--grid-line');
    ctx.lineWidth = 1;
    for(let c=0;c<=COLS;c++){
      ctx.beginPath();
      ctx.moveTo(c*cellPx, 0);
      ctx.lineTo(c*cellPx, ROWS*cellPx);
      ctx.stroke();
    }
    for(let r=0;r<=ROWS;r++){
      ctx.beginPath();
      ctx.moveTo(0, r*cellPx);
      ctx.lineTo(COLS*cellPx, r*cellPx);
      ctx.stroke();
    }
    // locked cells
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        if(board[r][c]){
          drawCell(ctx, c*cellPx, r*cellPx, cellPx, COLORS[board[r][c]]);
        }
      }
    }
    if(current){
      // ghost
      const gy = ghostY();
      ctx.globalAlpha = 0.9;
      for(const [cx,cy] of current.cells){
        const by = gy+cy;
        if(by >= 0){
          ctx.strokeStyle = COLORS[current.key];
          ctx.lineWidth = 2;
          ctx.strokeRect((current.x+cx)*cellPx+2, by*cellPx+2, cellPx-4, cellPx-4);
        }
      }
      ctx.globalAlpha = 1;
      // current
      for(const [cx,cy] of current.cells){
        const bx = current.x+cx, by = current.y+cy;
        if(by >= 0){
          drawCell(ctx, bx*cellPx, by*cellPx, cellPx, COLORS[current.key]);
        }
      }
    }
  }

  function drawMiniPiece(context, canvasEl, key){
    context.clearRect(0,0,canvasEl.width, canvasEl.height);
    if(!key) return;
    const cells = SHAPES[key];
    const size = 20;
    const xs = cells.map(c=>c[0]), ys = cells.map(c=>c[1]);
    const minX = Math.min(...xs), maxX = Math.max(...xs);
    const minY = Math.min(...ys), maxY = Math.max(...ys);
    const w = (maxX-minX+1)*size, h = (maxY-minY+1)*size;
    const offX = (canvasEl.width - w)/2 - minX*size;
    const offY = (canvasEl.height - h)/2 - minY*size;
    for(const [cx,cy] of cells){
      drawCell(context, offX+cx*size, offY+cy*size, size, COLORS[key]);
    }
  }
  function drawNext(){ drawMiniPiece(nextCtx, nextCanvas, next); }
  function drawHold(){ drawMiniPiece(holdCtx, holdCanvas, hold); }

  function endGame(){
    running = false;
    gameOver = true;
    overText.textContent = '점수: ' + score + ' · 레벨 ' + level;
    overOverlay.classList.add('show');
  }

  function loop(ts){
    if(!running) return;
    if(!lastTime) lastTime = ts;
    const dt = ts - lastTime;
    lastTime = ts;
    if(!paused){
      dropTimer += dt;
      if(dropTimer >= dropInterval){
        dropTimer = 0;
        if(!collides(current.cells, current.x, current.y+1)){
          current.y++;
        } else {
          lockPiece();
        }
        draw();
      }
    }
    requestAnimationFrame(loop);
  }

  function startGame(){
    board = emptyBoard();
    score = 0; level = 1; linesCleared = 0;
    dropInterval = 850; dropTimer = 0;
    hold = null; canHold = true;
    bag = [];
    next = nextFromBag();
    running = true; gameOver = false; paused = false;
    scoreEl.textContent = '0'; levelEl.textContent = '1'; linesEl.textContent = '0';
    startOverlay.classList.remove('show');
    overOverlay.classList.remove('show');
    pauseOverlay.classList.remove('show');
    resizeCanvas();
    drawHold();
    spawnPiece();
    lastTime = 0;
    requestAnimationFrame(loop);
  }

  function togglePause(){
    if(!running) return;
    paused = !paused;
    pauseOverlay.classList.toggle('show', paused);
  }

  document.addEventListener('keydown', (e) => {
    if(!running) return;
    switch(e.key){
      case 'ArrowLeft': e.preventDefault(); moveHorizontal(-1); break;
      case 'ArrowRight': e.preventDefault(); moveHorizontal(1); break;
      case 'ArrowUp': e.preventDefault(); rotate(); break;
      case 'ArrowDown': e.preventDefault(); softDrop(); break;
      case ' ': e.preventDefault(); hardDrop(); break;
      case 'c': case 'C': doHold(); break;
      case 'p': case 'P': togglePause(); break;
    }
  });

  document.getElementById('btnLeft').addEventListener('click', () => moveHorizontal(-1));
  document.getElementById('btnRight').addEventListener('click', () => moveHorizontal(1));
  document.getElementById('btnRotate').addEventListener('click', rotate);
  document.getElementById('btnDown').addEventListener('click', softDrop);
  document.getElementById('btnDrop').addEventListener('click', hardDrop);
  document.getElementById('btnHold').addEventListener('click', doHold);

  startBtn.addEventListener('click', startGame);
  retryBtn.addEventListener('click', startGame);
  resumeBtn.addEventListener('click', togglePause);

  resizeCanvas();
  startOverlay.classList.add('show');
})();
</script>

</body>
</html>
